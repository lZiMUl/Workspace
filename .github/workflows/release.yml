name: Tags

on:
  push:
    branches:
      - main

jobs:

  repository:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.name.outputs.name }}
      version: ${{ steps.version.outputs.version }}
      lower: ${{ steps.lower.outputs.lower }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get repository name
        id: name
        run: echo "name=$(echo $GITHUB_REPOSITORY | cut -d'/' -f2)" >> $GITHUB_OUTPUT

      - name: Get repository version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Lowercase name
        id: lower
        run: |
          NAME="${{ steps.name.outputs.name }}"
          LOWER=$(echo "$NAME" | tr '[:upper:]' '[:lower:]')
          echo "lower=$LOWER" >> $GITHUB_OUTPUT

  release:
    needs:
      - repository
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      packages: write

    env:
      NAME: ${{ needs.repository.outputs.name }}
      VERSION: ${{ needs.repository.outputs.version }}
      LOWER: ${{ needs.repository.outputs.lower }}
      GIT_USER_NAME: ${{ vars.GIT_USER_NAME }}
      GIT_USER_EMAIL: ${{ vars.GIT_USER_EMAIL }}
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "${GIT_USER_NAME}"
          git config user.email "${GIT_USER_EMAIL}"

      - name: Set remote repository url
        run: git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Import GPG key
        run: |
          mkdir -p ~/.gnupg
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          chmod 700 ~/.gnupg

      - name: Get GPG key ID
        id: key
        run: |
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F':' '/^sec/ {print $5}')
          echo "id=$KEY_ID" >> $GITHUB_OUTPUT

      - name: Configure Git GPG
        run: |
          git config gpg.program gpg
          git config user.signingkey ${{ steps.key.outputs.id }}
          git config commit.gpgsign true

      - name: Create signed tag
        run: |
          echo "$GPG_PASSPHRASE" | gpg \
            --batch \
            --yes \
            --pinentry-mode loopback \
            --passphrase-fd 0 \
            -u ${{ steps.key.outputs.id }} \
            -s -b -o /dev/null
          git tag -s v${VERSION} \
            -m "Release v${VERSION}" \
            --local-user ${{ steps.key.outputs.id }}

      - name: Push tag
        run: git push origin v${VERSION}

      - name: Extract changelog for current or latest version
        id: changelog
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if grep -q "## \[${VERSION}\]" CHANGELOG.md; then
          SELECTED_VERSION="${VERSION}"
          else
          SELECTED_VERSION=$(grep -Eo '^## \[[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.-]+)?\]' CHANGELOG.md | head -n 1 | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+([-+][A-Za-z0-9.-]+)?')
          fi
          echo "Using version: $SELECTED_VERSION"
          changelog=$(awk -v ver="$SELECTED_VERSION" '
          $0 ~ ("## \\[" ver "\\]") {flag=1; next} 
          /^## \[/ && flag {flag=0} 
          flag
          ' CHANGELOG.md)
          echo "changelog<<EOF_CHANGLOG" >> $GITHUB_OUTPUT
          echo "$changelog" >> $GITHUB_OUTPUT
          echo "EOF_CHANGLOG" >> $GITHUB_OUTPUT


      - name: Publish with GitHub CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY_FILE="release_body.md"
          {
            echo "# 🧾 Release Notes"
            echo ""
            echo "## 📦 Version"
            echo "\`${VERSION}\` (Build \`${{ github.run_number }}\`)"
            echo ""
            echo "## 🧩 Changes"
            echo "${{ steps.changelog.outputs.changelog }}"
            echo ""
            echo "_This changelog was automatically generated by CI._"
          } > "$BODY_FILE"
          
          gh release create "v${VERSION}" \
            --title "$NAME v${VERSION} (Build ${{ github.run_number }})" \
            --notes-file "$BODY_FILE" \
            --generate-notes \
            --verify-tag